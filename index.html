<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciamento de Usuarios</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Gerenciamento de Usuarios</h1>

      <section class="form-section">
        <h2>Cadastrar / Editar Usuario</h2>
        <div id="user-form">
          <input type="hidden" id="user-id" />

          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome" />
          </div>

          <div class="form-group">
            <label for="idade">Idade</label>
            <input type="number" id="idade" placeholder="Digite a idade" />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite o email" />
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite a senha" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-save">Salvar</button>
            <button type="reset" class="btn btn-cancel">Cancelar</button>
          </div>
        </div>
      </section>

      <section class="table-section">
        <h2>Lista de Usuarios</h2>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Idade</th>
              <th>Email</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="user-table-body"></tbody>
        </table>
      </section>
    </div>
  </body>
</html>
